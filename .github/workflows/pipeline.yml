name: Sync Upstream
"on":
  workflow_dispatch:
env:
  UV_NATIVE_TLS: "true"
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  PIP_CERT: /etc/ssl/certs/ca-certificates.crt
  NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
  PIP_BREAK_SYSTEM_PACKAGES: "1"
  PIP_DEFAULT_TIMEOUT: "300"
  PIP_RETRIES: "10"
  UV_HTTP_TIMEOUT: "300"
jobs:
  build-group:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - ruby-0.x-1.6
          - ruby-1.8.6-1.8.7
          - ruby-1.9
          - ruby-2.0
          - ruby-2.1
          - ruby-2.2
          - ruby-2.3
          - ruby-2.4
          - ruby-2.5
          - ruby-2.6
          - ruby-2.7
          - ruby-3.0
          - ruby-3.1
          - ruby-3.2
          - ruby-3.3
          - ruby-3.4
          - ruby-3.5-4.0
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          app_token: JSB943X_kqLNenX2BYz9oMIIVhn0hQW67TwwnwnzQLE28ld6q3cY4lS-o8T6-M4SQHS1V2JnyR8pqfC6CTo_Nw
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.sync-upstream.outputs.branch || github.ref_name }}
        continue-on-error: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        continue-on-error: true
      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          build-args: |
            BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest
            PSE_PROXY=http://${{ env.PSE_PROXY_IP }}:3128
          secret-files: |
            pse-ca=/etc/ssl/certs/pse.pem
        continue-on-error: true
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          cleanup: 'true'

  build-merge:
    needs:
      - "build-group"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ruby-0.x-2.4
            tag: ruby-0.x-2.4
          - target: ruby-2.5-3.1
            tag: ruby-2.5-3.1
          - target: ruby-3.2-4.0
            tag: ruby-3.2-4.0
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          app_token: JSB943X_kqLNenX2BYz9oMIIVhn0hQW67TwwnwnzQLE28ld6q3cY4lS-o8T6-M4SQHS1V2JnyR8pqfC6CTo_Nw
      - name: Remove unnecessary files to release disk space
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
        continue-on-error: true
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.sync-upstream.outputs.branch || github.ref_name }}
        continue-on-error: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        continue-on-error: true
      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.final
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          build-args: |
            BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest
            PSE_PROXY=http://${{ env.PSE_PROXY_IP }}:3128
          secret-files: |
            pse-ca=/etc/ssl/certs/pse.pem
        continue-on-error: true
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          cleanup: 'true'

  build-latest:
    needs:
      - "build-merge"
    runs-on: ubuntu-latest
    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          app_token: JSB943X_kqLNenX2BYz9oMIIVhn0hQW67TwwnwnzQLE28ld6q3cY4lS-o8T6-M4SQHS1V2JnyR8pqfC6CTo_Nw
      - name: Remove unnecessary files to release disk space
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/ghc \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
        continue-on-error: true
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.sync-upstream.outputs.branch || github.ref_name }}
        continue-on-error: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        continue-on-error: true
      - name: Build latest image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.final
          push: false
          cache-from: type=gha,scope=latest
          cache-to: type=gha,mode=max,scope=latest
          build-args: |
            BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:latest
            PSE_PROXY=http://${{ env.PSE_PROXY_IP }}:3128
          secret-files: |
            pse-ca=/etc/ssl/certs/pse.pem
        continue-on-error: true
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          cleanup: 'true'
